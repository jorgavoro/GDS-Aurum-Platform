spring:
  application:
    name: aurum-bootstrap

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/aurumdb
    username: aurum
    password: aurum
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    org.springframework: INFO
    com.globaldynamicssystems: DEBUG